<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ic_tech — Família Neo</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--green-600:#1B3A3A;--green-500:#24504F;--green-400:#4E8C80;--green-100:#E8F6E0;
--ink-900:#111113;--ink-700:#26262B;--ink-500:#6B7280;--ink-400:#8A8F99;--ink-200:#D7DAE0;--ink-100:#ECEEF1;--ink-50:#F4F4F5;
--page-bg:#FBFBFA;--cream:#F4F2EC;
}
html,body,#root{height:100%;overflow:hidden;font-family:'Inter',sans-serif}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
.slide{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 64px;overflow-y:auto}
.slide.dark{background:var(--ink-900);color:var(--cream)}
.slide.light{background:var(--page-bg);color:var(--ink-900)}
.slide>*{animation:fadeUp .5s ease both}
.slide>*:nth-child(2){animation-delay:.08s}
.slide>*:nth-child(3){animation-delay:.15s}
.slide>*:nth-child(4){animation-delay:.22s}
.slide>*:nth-child(5){animation-delay:.28s}
.eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--green-500);margin-bottom:8px}
.counter{position:absolute;top:32px;right:48px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink-400)}
.product-title{font-family:'Inter Tight',sans-serif;font-weight:700;font-size:36px;letter-spacing:-0.02em;margin-bottom:8px}
.pitch{font-size:18px;color:var(--ink-500);max-width:700px;text-align:center;margin-bottom:32px}
.features{display:flex;gap:20px;flex-wrap:wrap;justify-content:center;margin-bottom:28px;max-width:900px}
.feature-card{background:var(--ink-50);border:1px solid var(--ink-200);border-radius:12px;padding:20px;flex:1;min-width:200px;max-width:280px}
.feature-card .icon{font-size:24px;margin-bottom:8px}
.feature-card h4{font-family:'Inter Tight',sans-serif;font-weight:600;font-size:14px;margin-bottom:4px}
.feature-card p{font-size:13px;color:var(--ink-500);line-height:1.4}
.highlight-box{background:var(--green-100);border-left:4px solid var(--green-400);border-radius:8px;padding:14px 18px;font-size:13px;line-height:1.5;color:var(--green-600)}
.highlight-box strong{display:block;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;margin-bottom:4px;color:var(--green-400)}
.slide-product{position:absolute;inset:0;display:flex;flex-direction:column;background:var(--ink-900);overflow:hidden;max-height:100vh}
.slide-product .grid-bg{position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:64px 64px}
.slide-product-header{position:relative;z-index:1;text-align:center;padding:32px 48px 20px;flex-shrink:0}
.slide-product-header .ep{font-family:'JetBrains Mono',monospace;font-size:15px;letter-spacing:.18em;text-transform:uppercase;color:var(--green-400);margin-bottom:12px}
.slide-product-header h2{font-family:'Inter Tight',sans-serif;font-weight:700;font-size:clamp(36px,4.5vw,56px);color:#fff;letter-spacing:-.03em;margin-bottom:8px}
.slide-product-header .sub{font-size:20px;color:var(--ink-400);font-style:italic}
.slide-product-body{position:relative;z-index:1;flex:1;display:flex;align-items:stretch;min-height:0;overflow:hidden}
.slide-product-left{flex:1;display:flex;flex-direction:column;gap:10px;justify-content:center;padding:20px clamp(32px,4vw,56px) 40px;overflow:hidden}
.slide-product-left img{width:100%;border-radius:12px;border:1px solid rgba(255,255,255,.1);box-shadow:0 12px 40px -8px rgba(0,0,0,.5);display:block;object-fit:cover;object-position:center top;cursor:pointer;transition:transform .3s ease}
.slide-product-left video{width:100%;border-radius:12px;border:1px solid rgba(255,255,255,.1);box-shadow:0 12px 40px -8px rgba(0,0,0,.5);display:block;object-fit:contain;cursor:pointer;transition:transform .3s ease;background:#000}
.slide-product-left.has2 img,.slide-product-left.has2 video{flex:1;min-height:0}
.slide-product-left.single img,.slide-product-left.single video{flex:1;min-height:0}
.media-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:200;cursor:pointer;animation:fadeIn .2s ease}
.media-overlay img{max-width:90%;max-height:90%;border-radius:16px;box-shadow:0 40px 80px rgba(0,0,0,.5);object-fit:contain}
.slide-product-right{flex:1;display:flex;flex-direction:column;justify-content:center;gap:20px;padding:20px clamp(32px,4vw,56px) 40px;border-left:1px solid rgba(255,255,255,.06)}
.feature-item{display:flex;gap:14px;align-items:flex-start;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:16px}
.feature-item .fi-icon{font-size:26px;flex-shrink:0;margin-top:2px}
.feature-item .fi-text h4{font-family:'Inter Tight',sans-serif;font-weight:600;font-size:18px;color:#fff;margin-bottom:3px}
.feature-item .fi-text p{font-size:15px;color:var(--ink-400);line-height:1.5}
.highlight-box-dark{background:rgba(36,80,79,.15);border-left:3px solid var(--green-400);border-radius:8px;padding:16px 20px;font-size:15px;line-height:1.6;color:var(--green-100)}
.highlight-box-dark strong{display:block;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;margin-bottom:4px;color:var(--green-400)}
.slide-product-full{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 clamp(48px,8vw,120px) 40px;gap:32px;min-height:0}
.features-grid{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;max-width:1000px}
.features-grid .feature-card-full{flex:1;min-width:200px;max-width:280px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:24px;text-align:center}
.features-grid .feature-card-full .fc-icon{font-size:36px;margin-bottom:12px}
.features-grid .feature-card-full h4{font-family:'Inter Tight',sans-serif;font-weight:600;font-size:20px;color:#fff;margin-bottom:6px}
.features-grid .feature-card-full p{font-size:16px;color:var(--ink-400);line-height:1.5}
.highlight-full{max-width:800px;width:100%}
.slide-product-footer{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);font-family:'JetBrains Mono',monospace;font-size:10px;color:rgba(255,255,255,.3);letter-spacing:.08em;z-index:1}
.slide-product-counter{position:absolute;top:32px;right:48px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink-400);z-index:1}
.footer{position:absolute;bottom:24px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ink-400);letter-spacing:.08em}
.dots{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:100}
.dots span{width:8px;height:8px;border-radius:50%;background:var(--ink-200);transition:all .2s}
.dots span.active{background:var(--green-400);transform:scale(1.3)}
.nav-zone{position:fixed;top:0;bottom:0;width:80px;z-index:50;cursor:pointer}
.nav-zone.left{left:0}.nav-zone.right{right:0}
.chip{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:11px;background:var(--ink-700);color:var(--ink-400);padding:6px 14px;border-radius:20px;margin-top:16px}
.grid-overview{display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:800px;margin-top:24px}
.grid-card{background:var(--ink-50);border:1px solid var(--ink-200);border-radius:12px;padding:20px}
.grid-card h4{font-family:'Inter Tight',sans-serif;font-weight:600;font-size:15px;color:var(--green-500);margin-bottom:8px}
.grid-card p{font-size:13px;color:var(--ink-500);line-height:1.5}
.cta-title{font-family:'Inter Tight',sans-serif;font-weight:700;font-size:48px;letter-spacing:-0.03em;margin-bottom:16px}
.cta-box{border:1px solid var(--green-400);border-radius:12px;padding:24px 32px;margin-top:24px;max-width:600px;text-align:center}
.cta-box strong{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;color:var(--green-400)}
.cta-box p{margin-top:8px;font-size:15px;color:var(--cream)}
.catalog{position:absolute;inset:0;display:flex;overflow:hidden;background:#2A2A2A}
.catalog-col{flex:1;display:flex;flex-direction:column;justify-content:space-between;padding:24px 0;position:relative;overflow:hidden}

.catalog-col .cat-label{position:absolute;bottom:40px;left:50%;font-family:'Inter Tight',sans-serif;font-weight:700;font-size:22px;color:#66E26F;writing-mode:vertical-rl;text-orientation:mixed;transform:translateX(-50%) rotate(180deg);white-space:nowrap;user-select:none;letter-spacing:.02em}
.catalog-col.light-col .cat-label{color:#137051}
</style>
</head>
<body>
<div id="root"></div>
<script src="vendor/react.production.min.js"></script>
<script src="vendor/react-dom.production.min.js"></script>
<script src="build/app.js"></script>
</body>
</html>
